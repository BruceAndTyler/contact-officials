contact_form:
  steps:
    - visit: "https://nj-$META_OFFICIAL_DISTRICT_ZFILL-district.web.fireside21.app/forms/writeyourrep/"
    - select:
        - name: PrefixList
          selector: "#ctl00_ctl16_PrefixList"
          value: $NAME_PREFIX
          options:
              "Mr.": "Mr."
              "Mrs.": "Mrs."
              "Ms.": "Ms."
              "Miss": "Miss"
              "Dr.": "Dr."
    - fill_in:
        - name: FirstName
          selector: "#ctl00_ctl16_FirstName"
          value: $NAME_FIRST
          required: true
        - name: LastName
          selector: "#ctl00_ctl16_LastName"
          value: $NAME_LAST
          required: true
        - name: Street
          selector: "#ctl00_ctl16_Street"
          value: $ADDRESS_STREET
          required: true
        - name: City
          selector: "#ctl00_ctl16_City"
          value: $ADDRESS_CITY
          required: true
    - select:
        - name: State
          selector: "#ctl00_ctl16_State"
          value: $ADDRESS_STATE_POSTAL_ABBREV
    - fill_in:
        - name: Zip
          selector: "#ctl00_ctl16_Zip"
          value: $ADDRESS_ZIP5
          required: true
        - name: Phone
          selector: "#ctl00_ctl16_Phone"
          value: $PHONE
        - name: Email
          selector: "#ctl00_ctl16_Email"
          value: $EMAIL
          required: true
    - select:
        - name: IssuesList
          selector: "#ctl00_ctl16_IssuesList"
          value: $TOPIC
          required: false
    - fill_in:
        - name: Subject
          selector: "#ctl00_ctl16_Subject"
          value: $SUBJECT
          required: true
        - name: Body
          selector: "#ctl00_ctl16_Body"
          value: $MESSAGE
          required: true
    - click_on:
        - selector: "#ctl00_ctl16_SubmitButton"
  success:
    body:
      contains: "Thank you"
