contact_form:
  steps:
    # Oklahoma House redesigned to IndiGov platform.
    # URL: https://www.okhouse.gov/contact?id={member_id}
    # Member IDs are opaque (not district numbers).
    # $META_OFFICIAL_URL should be set to the full contact URL.
    - visit: "$META_OFFICIAL_URL"
    - fill_in:
        - name: constituent.firstName
          selector: "input[name='constituent.firstName']"
          value: $NAME_FIRST
          required: true
        - name: constituent.lastName
          selector: "input[name='constituent.lastName']"
          value: $NAME_LAST
          required: true
        - name: constituent.address1
          selector: "input[name='constituent.address1']"
          value: $ADDRESS_STREET
          required: true
        - name: constituent.city
          selector: "input[name='constituent.city']"
          value: $ADDRESS_CITY
          required: true
        - name: constituent.state
          selector: "input[name='constituent.state']"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
        - name: constituent.zipCode
          selector: "input[name='constituent.zipCode']"
          value: $ADDRESS_ZIP5
          required: true
        - name: constituent.phoneNumber
          selector: "input[name='constituent.phoneNumber']"
          value: $PHONE
          required: true
        - name: constituent.emailAddress
          selector: "input[name='constituent.emailAddress']"
          value: $EMAIL
          required: true
        - name: subject
          selector: "input[name='subject']"
          value: $SUBJECT
          required: true
        - name: body
          selector: "textarea[name='body']"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - value: Send
          selector: "button:has-text('Send')"
  success:
    body:
      contains: "Thank you"
