contact_form:
  steps:
    # Oklahoma Senate contact form.
    # URL: https://oksenate.gov/contacts/contact-senator?sid={senator_id}
    # The state select uses select2 (aria-hidden) with full state names as values.
    # We skip the select step and use JavaScript to set it instead.
    - visit: "$META_OFFICIAL_URL"
    - fill_in:
        - name: your_name
          selector: "#edit-your-name"
          value: $NAME_FULL
          required: true
        - name: your_address
          selector: "#edit-your-address"
          value: $ADDRESS_STREET
          required: true
        - name: your_city
          selector: "#edit-your-city"
          value: $ADDRESS_CITY
          required: true
    - javascript:
        # Set state via JS since select2 hides the native <select>.
        # Map postal abbreviation to full name, set value, trigger change.
        - value: >
            (function(){
              var abbr = document.querySelector('#edit-your-state');
              if (!abbr) return;
              var opts = Array.from(abbr.options);
              abbr.value = 'Oklahoma';
              abbr.dispatchEvent(new Event('change', {bubbles: true}));
            })();
    - fill_in:
        - name: your_zipcode
          selector: "#edit-your-zipcode"
          value: $ADDRESS_ZIP5
          required: true
        - name: phone_number
          selector: "#edit-phone-number"
          value: $PHONE
          required: false
        - name: your_email_address
          selector: "#edit-your-email-address"
          value: $EMAIL
          required: true
        - name: subject
          selector: "#edit-subject"
          value: $SUBJECT
          required: false
        - name: type_your_message_here
          selector: "#edit-type-your-message-here"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - value: Submit
          selector: "input.webform-button--submit"
  success:
    body:
      contains: "Thank you for contacting your"
