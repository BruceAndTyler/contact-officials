contact_form:
  steps:
    # Kentucky Senate contact forms are now in iframes on the new site.
    # Parent page: https://apps.legislature.ky.gov/Legislators/Contact/Sen-XX.html
    # The opinion/contact iframe loads from cm-connect.kylegislature.gov.
    # We navigate directly to the iframe URL to avoid cross-frame issues.
    # __cid: SEN_D{district zero-padded to 2}, __fid: 100002 (opinion form)
    - visit: "https://cm-connect.kylegislature.gov/IQExtranet/EForm.aspx?__cid=SEN_D$META_OFFICIAL_DISTRICT_ZFILL&__fid=100002&iframe=Y"
    - fill_in:
        - name: qi_1_first_name
          selector: "#qi_1_first_name"
          value: $NAME_FIRST
          required: true
        - name: qi_1_last_name
          selector: "#qi_1_last_name"
          value: $NAME_LAST
          required: true
        - name: qi_1_addr_1
          selector: "#qi_1_addr_1"
          value: $ADDRESS_STREET
          required: true
        - name: qi_1_city
          selector: "#qi_1_city"
          value: $ADDRESS_CITY
          required: true
    - select:
        - name: qi_1_state
          selector: "#qi_1_state"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
    - fill_in:
        - name: qi_1_zip
          selector: "#qi_1_zip"
          value: $ADDRESS_ZIP5
          required: true
        - name: qi_1_email
          selector: "#qi_1_email"
          value: $EMAIL
          required: true
        - name: qi_1_email_confirm
          selector: "#qi_1_email_confirm"
          value: $EMAIL
          required: true
        - name: qi_1_hphone
          selector: "#qi_1_hphone"
          value: $PHONE
        - name: qi_2
          selector: "#qi_2"
          value: $SUBJECT
          required: true
        - name: qi_3
          selector: "#qi_3"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - value: "Submit"
          selector: "#btn_submit"
  success:
    body:
      contains: "Thank you"
