contact_form:
  steps:
    # Washington Senate contact form (shared with House).
    # URL: https://app.leg.wa.gov/pbc/MemberEmail/{district}/{position}
    # Senate position is always 0.
    # Requires district verification first, then personal info + message.
    # Message field uses TinyMCE — form_filler handles this via JS fallback.
    - visit: "https://app.leg.wa.gov/pbc/MemberEmail/$META_OFFICIAL_DISTRICT/0"
    - fill_in:
        - name: Model.StreetAddress
          selector: "#street-address-txt"
          value: $ADDRESS_STREET
          required: true
        - name: Model.City
          selector: "#city-txt"
          value: $ADDRESS_CITY
          required: true
        - name: Model.State
          selector: "#state-txt"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
        - name: Model.Zip
          selector: "#zip-txt"
          value: $ADDRESS_ZIP5
          required: true
    - click_on:
        - value: Verify District
          selector: "button:has-text('Verify District')"
    - wait:
        - value: 5
    - fill_in:
        - name: Model.FirstName
          selector: "#firstname"
          value: $NAME_FIRST
          required: true
        - name: Model.LastName
          selector: "#lastname"
          value: $NAME_LAST
          required: true
        - name: Model.Email
          selector: "#email"
          value: $EMAIL
          required: true
        - name: Model.ConfirmEmail
          selector: "#confirmemail"
          value: $EMAIL
          required: true
        - name: Model.PhoneNumber
          selector: "#phonenumber"
          value: $PHONE
        - name: Model.Subject
          selector: "#subject"
          value: $SUBJECT
          required: true
        - name: Comment
          selector: "#messageEditor"
          value: $MESSAGE
          required: true
    - click_on:
        - value: Send email
          selector: "button:has-text('Send email')"
  success:
    body:
      contains: "successfully sent"
