contact_form:
  steps:
    - visit: "$META_OFFICIAL_URL/contact"
    - fill_in:
        - name: firstName
          selector: "#first-name"
          value: $NAME_FIRST
          required: true
        - name: lastName
          selector: "#last-name"
          value: $NAME_LAST
          required: true
        - name: email
          selector: "#email"
          value: $EMAIL
          required: true
        - name: phone
          selector: "#phone"
          value: $PHONE
        - name: addressLine1
          selector: "#address-line-1"
          value: $ADDRESS_STREET
          required: true
        - name: city
          selector: "#city"
          value: $ADDRESS_CITY
          required: true
    - select:
        - name: state
          selector: 'select[name="address.state"]'
          value: $ADDRESS_STATE_POSTAL_ABBREV
          options:
            - AL
            - AK
            - AZ
            - AR
            - CA
            - CO
            - CT
            - DE
            - DC
            - FL
            - GA
            - HI
            - ID
            - IL
            - IN
            - IA
            - KS
            - KY
            - LA
            - ME
            - MD
            - MA
            - MI
            - MN
            - MS
            - MO
            - MT
            - NE
            - NV
            - NH
            - NJ
            - NM
            - NY
            - NC
            - ND
            - OH
            - OK
            - OR
            - PA
            - RI
            - SC
            - SD
            - TN
            - TX
            - UT
            - VT
            - VA
            - WA
            - WV
            - WI
            - WY
    - fill_in:
        - name: zip
          selector: "#zip"
          value: $ADDRESS_ZIP5
          required: true
        - name: subject
          selector: "#subject"
          value: $SUBJECT
          required: true
        - name: message
          selector: "#message"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - selector: "button.link-button[type=submit]"
  success:
    body:
      contains: "MESSAGE SENT SUCCESSFULLY"
