contact_form:
  steps:
    - visit: "$META_OFFICIAL_URL"
    - fill_in:
        - name: Name
          selector: "#Name"
          value: $NAME_FULL
          required: true
        - name: EmailAddress
          selector: "#EmailAddress"
          value: $EMAIL
          required: true
        - name: Address
          selector: "#Address"
          value: $ADDRESS_STREET
          required: false
        - name: Address2
          selector: "#Address2"
          value: $ADDRESS_STREET_2
          required: false
        - name: City
          selector: "#City"
          value: $ADDRESS_CITY
          required: true
        - name: Zip
          selector: "#Zip"
          value: $ADDRESS_ZIP5
          required: false
        - name: Phone
          selector: "#Phone"
          value: $PHONE
          required: false
        - name: Message
          selector: "#Message"
          value: $MESSAGE
          required: true
    - click_on:
        - value: "Send E-mail"
          selector: "#btnSubmit"
  success:
    body:
      contains: "has been successfully sent."
