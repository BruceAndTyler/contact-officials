contact_form:
  steps:
    # Utah Senate uses WordPress Contact Form 7 on senator profile pages.
    # URL: https://senate.utah.gov/sen/{SLUG}/
    # $META_OFFICIAL_URL should point to the senator's profile page.
    - visit: "$META_OFFICIAL_URL"
    - fill_in:
        - name: your-name
          selector: "input[name=your-name]"
          value: $NAME_FULL
          required: true
        - name: your-email
          selector: "input[name=your-email]"
          value: $EMAIL
          required: true
        - name: address
          selector: "input[name=address]"
          value: $ADDRESS_STREET
          required: true
        - name: your-subject
          selector: "input[name=your-subject]"
          value: $SUBJECT
          required: true
        - name: your-message
          selector: "textarea[name=your-message]"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - selector: "input[type=submit]"
  success:
    body:
      contains: "Thank you"
