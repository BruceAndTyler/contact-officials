contact_form:
  steps:
    # Texas House email forms are now at /members/{member_id}/email
    # Example: https://house.texas.gov/members/2540/email
    # $META_OFFICIAL_URL should point to the email page directly.
    - visit: "$META_OFFICIAL_URL"
    - select:
        - name: prefix
          selector: "select[name=prefix]"
          value: $NAME_PREFIX
          options:
            "Mr": "Mr"
            "Ms": "Ms"
            "Miss": "Miss"
            "Mrs": "Mrs"
            "Rev": "Rev"
            "Fr": "Fr"
            "Dr": "Dr"
    - fill_in:
        - name: first_name
          selector: "#first_name"
          value: $NAME_FIRST
          required: true
        - name: last_name
          selector: "#last_name"
          value: $NAME_LAST
          required: true
        - name: business
          selector: "#business"
          value: "None"
        - name: address
          selector: "#address"
          value: $ADDRESS_STREET
          required: true
        - name: city
          selector: "#city"
          value: $ADDRESS_CITY
          required: true
        - name: state
          selector: "#state"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
        - name: zipcode
          selector: "#zipcode"
          value: $ADDRESS_ZIP5
          required: true
        - name: phone
          selector: "#phone"
          value: $PHONE
        - name: email
          selector: "#email"
          value: $EMAIL
          required: true
        - name: subject
          selector: "#subject"
          value: $SUBJECT
        - name: message
          selector: "#message"
          value: $MESSAGE
          required: true
    - recaptcha:
        - value: true
    - click_on:
        - value: Submit
          selector: "button:has-text('Submit')"
  success:
    body:
      contains: "Thank You"
