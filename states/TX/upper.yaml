contact_form:
  steps:
    # Texas Senate member pages have email links with auth tokens.
    # Navigate to the member page, click the email link, then fill the form.
    # The email form URL is dynamically generated with an auth param.
    - visit: "$META_OFFICIAL_URL"
    - click_on:
        - selector: "a:has-text('Click here to e-mail'), a:has-text('E-mail')"
    - fill_in:
        - name: sender
          selector: "#sender"
          value: $EMAIL
          required: true
        - name: fname
          selector: "#fname"
          value: $NAME_FIRST
          required: true
        - name: lname
          selector: "#lname"
          value: $NAME_LAST
          required: true
        - name: phone1
          selector: "#phone1"
          value: $PHONE_AREA_CODE
        - name: address1
          selector: "#address1"
          value: $ADDRESS_STREET
          required: true
        - name: city
          selector: "#city"
          value: $ADDRESS_CITY
          required: true
        - name: state
          selector: "#state"
          value: $ADDRESS_STATE_POSTAL_ABBREV
          required: true
        - name: zipcode
          selector: "#zipcode"
          value: $ADDRESS_ZIP5
          required: true
        - name: subject
          selector: "#subject"
          value: $SUBJECT
          required: true
        - name: message
          selector: "#message"
          value: $MESSAGE
          required: true
    - click_on:
        - value: "SEND MESSAGE"
          selector: "input[type=submit]"
  success:
    body:
      contains: "The information you supplied was reported as having been successfully delivered."
