bioguide: M001198
contact_form:
    steps:
        - visit: "https://www.marshall.senate.gov/contact/contact-form/"
        - find:
            - selector: "#input_11_2"
        - fill_in:
              - name: input_2
                selector: "#input_11_2"
                value: $NAME_FIRST
                required: true
              - name: input_3
                selector: "#input_11_3"
                value: $NAME_LAST
                required: true
              - name: input_6_1
                selector: "#input_11_6_1"
                value: $ADDRESS_STREET
                required: true
              - name: input_6_3
                selector: "#input_11_6_3"
                value: $ADDRESS_CITY
              - name: input_6_4
                selector: "#input_11_6_4"
                value: $ADDRESS_STATE_FULL
              - name: input_6_5
                selector: "#input_11_6_5"
                value: $ADDRESS_ZIP5
              - name: input_7
                selector: "#input_11_7"
                value: $PHONE
              - name: input_9
                selector: "#input_11_9"
                value: $EMAIL
                required: true
              - name: input_9_2
                selector: "#input_11_9_2"
                value: $EMAIL
                required: true
              - name: input_11
                selector: "#input_11_11"
                value: $SUBJECT
                required: true
              - name: input_12
                selector: "#input_11_12"
                value: $MESSAGE
                required: true
        - select:
              - name: input_1
                selector: "#input_11_1"
                value: $NAME_PREFIX
                required: true
              - name: input_17
                selector: "#input_11_17"
                value: $TOPIC
                required: true
        - javascript:
              - value: "document.querySelector('#choice_11_14_0').click();"
        - javascript:
              - value: "document.querySelector('#choice_11_18_1').click();"
        - click_on:
              - selector: "#gform_submit_button_11"
