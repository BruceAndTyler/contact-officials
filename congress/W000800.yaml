bioguide: W000800
contact_form:
    steps:
        - visit: "https://www.welch.senate.gov/email-peter/"
        - fill_in:
              - name: input_19
                selector: "#input_4_19"
                value: $NAME_FIRST
                required: true
              - name: input_20
                selector: "#input_4_20"
                value: $NAME_LAST
                required: true
              - name: input_22
                selector: "#input_4_22"
                value: $ADDRESS_STREET
                required: true
              - name: input_5
                selector: "#input_4_5"
                value: $ADDRESS_CITY
                required: true
              - name: input_7
                selector: "#input_4_7"
                value: $ADDRESS_ZIP5
                required: true
              - name: input_9
                selector: "#input_4_9"
                value: $EMAIL
                required: true
              - name: input_8
                selector: "#input_4_8"
                value: $PHONE
                required: true
              - name: input_32
                selector: "#input_4_32"
                value: $SUBJECT
                required: true
              - name: input_31
                selector: "#input_4_31"
                value: $MESSAGE
                required: true
        - select:
              - name: input_21
                selector: "#input_4_21"
                value: $NAME_PREFIX
              - name: input_6
                selector: "#input_4_6"
                value: $ADDRESS_STATE_POSTAL_ABBREV
                required: true
              - name: input_25
                selector: "#input_4_25"
                value: $TOPIC
                required: true
        - click_on:
              - selector: "#gform_submit_button_4"
