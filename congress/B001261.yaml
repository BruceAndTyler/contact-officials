bioguide: B001261
contact_form:
    steps:
        - visit: "https://www.barrasso.senate.gov/public/index.cfm/contact-form"
        - fill_in:
              - name: first-name
                selector: "input[name='first-name']"
                value: $NAME_FIRST
                required: true
              - name: last-name
                selector: "input[name='last-name']"
                value: $NAME_LAST
                required: true
              - name: Address1
                selector: "input[name='Address1']"
                value: $ADDRESS_STREET
                required: true
              - name: city
                selector: "input[name='city']"
                value: $ADDRESS_CITY
                required: true
              - name: zip-code
                selector: "input[name='zip-code']"
                value: $ADDRESS_ZIP5
                required: true
              - name: your-email
                selector: "input[name='your-email']"
                value: $EMAIL
                required: true
              - name: your-message
                selector: "textarea[name='your-message']"
                value: $MESSAGE
                required: true
              - name: home-phone
                selector: "input[name='home-phone']"
                value: $PHONE
        - javascript:
              - value: "document.querySelector('input[name=\"want-response\"][value=\"Yes\"]').click();"
        - select:
              - name: Prefix
                selector: "select[name='Prefix']"
                value: $NAME_PREFIX
                required: true
              - name: State
                selector: "select[name='State']"
                value: $ADDRESS_STATE_POSTAL_ABBREV
                required: true
              - name: topic
                selector: "select[name='topic']"
                value: $TOPIC
                required: true
        - javascript:
              - value: "var labels = document.querySelectorAll('label'); for (var i = 0; i < labels.length; i++) { if (labels[i].textContent.toLowerCase().indexOf('if other') !== -1) { var forAttr = labels[i].getAttribute('for'); var inp = forAttr ? document.getElementById(forAttr) : labels[i].querySelector('input,textarea'); if (!inp) inp = labels[i].parentElement.querySelector('input[type=\"text\"],textarea'); if (inp) { inp.value = 'GovPal Reach Webform Test'; inp.dispatchEvent(new Event('input',{bubbles:true})); break; } } }"
