bioguide: P000595
contact_form:
    steps:
        - visit: "https://www.peters.senate.gov/contact/email-gary"
        - find:
            - selector: "#email"
        - fill_in:
              - name: prefix
                selector: "#input-260E577D-5056-A066-6070-226296904340"
                value: $NAME_PREFIX
              - name: firstName
                selector: "#input-AB59F0AE-4040-F985-52CD-AA63153C7925"
                value: $NAME_FIRST
                required: true
              - name: lastName
                selector: "#input-AB59F0ED-4040-F985-52CD-265D9CF13F5E"
                value: $NAME_LAST
                required: true
              - name: address
                selector: "#input-AB5B6829-4040-F985-52CD-BF81DCC1F57D"
                value: $ADDRESS_STREET
                required: true
              - name: city
                selector: "#input-AB5B6875-4040-F985-52CD-909541CB4B6C"
                value: $ADDRESS_CITY
                required: true
              - name: zip
                selector: "#input-AB5B68B4-4040-F985-52CD-269A4338D057"
                value: $ADDRESS_ZIP5
                required: true
              - name: email
                selector: "#email"
                value: $EMAIL
                required: true
              - name: verifyEmail
                selector: "#input-AB721CE8-4040-F985-52CD-9E550E8A76AA"
                value: $EMAIL
                required: true
              - name: phone
                selector: "#input-AB67BC2F-4040-F985-52CD-007A86DA4D47"
                value: $PHONE
              - name: subject
                selector: "#input-93E136F1-4040-F985-52CD-D4EB6A849AA3"
                value: $SUBJECT
                required: true
              - name: message
                selector: "#input-ADE64E73-4040-F985-52CD-A3AB6BCD2C51"
                value: $MESSAGE
                required: true
        - select:
              - name: state
                selector: "#input-AB5B6894-4040-F985-52CD-DFC6D3C729DF"
                value: $ADDRESS_STATE_POSTAL_ABBREV
                required: true
              - name: topic
                selector: "#input-AB8156A0-4040-F985-52CD-49CE65770EFC"
                value: $TOPIC
                required: true
        - javascript:
              - value: "var cb = document.querySelector('#input-F605C9E3-4040-F985-52CD-9DC4076E8672'); if (cb) { var lbl = document.querySelector('label[for=\"input-F605C9E3-4040-F985-52CD-9DC4076E8672\"]'); if (lbl) { lbl.click(); } else { cb.click(); } }"
