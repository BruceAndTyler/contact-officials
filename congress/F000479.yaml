bioguide: F000479
contact_form:
    steps:
        - visit: "https://www.fetterman.senate.gov/contact/"
        - fill_in:
              - name: input_1.3
                selector: "#input_3_1_3"
                value: $NAME_FIRST
                required: true
              - name: input_1.6
                selector: "#input_3_1_6"
                value: $NAME_LAST
                required: true
              - name: input_2.1
                selector: "#input_3_2_1"
                value: $ADDRESS_STREET
                required: true
              - name: input_2.3
                selector: "#input_3_2_3"
                value: $ADDRESS_CITY
                required: true
              - name: input_2.5
                selector: "#input_3_2_5"
                value: $ADDRESS_ZIP5
                required: true
              - name: input_4
                selector: "#input_3_4"
                value: $EMAIL
                required: true
              - name: input_3
                selector: "#input_3_3"
                value: $PHONE
              - name: input_6
                selector: "#input_3_6"
                value: $MESSAGE
                required: true
        - select:
              - name: input_1.2
                selector: "#input_3_1_2"
                value: $NAME_PREFIX
              - name: input_2.4
                selector: "#input_3_2_4"
                value: $ADDRESS_STATE_POSTAL_ABBREV
              - name: input_9
                selector: "#input_3_9"
                value: $TOPIC
                required: true
        - click_on:
              - selector: "#gform_submit_button_3"
