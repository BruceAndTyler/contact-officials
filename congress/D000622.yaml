bioguide: D000622
contact_form:
    steps:
        - visit: "https://www.duckworth.senate.gov/connect/comment"
        - fill_in:
              - name: FirstName
                selector: "input[name='FirstName']"
                value: $NAME_FIRST
                required: true
              - name: LastName
                selector: "input[name='LastName']"
                value: $NAME_LAST
                required: true
              - name: Email
                selector: "input[name='Email']"
                value: $EMAIL
                required: true
              - name: Address1
                selector: "input[name='Address1']"
                value: $ADDRESS_STREET
                required: true
              - name: City
                selector: "input[name='City']"
                value: $ADDRESS_CITY
                required: true
              - name: Zip
                selector: "input[name='Zip']"
                value: $ADDRESS_ZIP5
                required: true
              - name: Phone
                selector: "input[name='Phone']"
                value: $PHONE
              - name: Message
                selector: "textarea[name='Message']"
                value: $MESSAGE
                required: true
              - name: Subject
                selector: "input[name='Subject']"
                value: $SUBJECT
                required: true
        - select:
              - name: Prefix
                selector: "select[name='Prefix']"
                value: $NAME_PREFIX
                required: true
              - name: State
                selector: "select[name='State']"
                value: $ADDRESS_STATE_POSTAL_ABBREV
                required: true
              - name: Topic
                selector: "select[name='Topic']"
                value: $TOPIC
                required: true
