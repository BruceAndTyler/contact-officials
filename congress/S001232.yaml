bioguide: S001232
contact_form:
    steps:
        - visit: "https://www.sheehy.senate.gov/share-your-opinion/"
        - fill_in:
              - name: input_44
                selector: "#input_2_44"
                value: $NAME_PREFIX
              - name: input_2
                selector: "#input_2_2"
                value: $NAME_FIRST
                required: true
              - name: input_3
                selector: "#input_2_3"
                value: $NAME_LAST
                required: true
              - name: input_6.1
                selector: "#input_2_6_1"
                value: $ADDRESS_STREET
                required: true
              - name: input_6.3
                selector: "#input_2_6_3"
                value: $ADDRESS_CITY
                required: true
              - name: input_6.5
                selector: "#input_2_6_5"
                value: $ADDRESS_ZIP5
                required: true
              - name: input_41
                selector: "#input_2_41"
                value: $PHONE
                required: true
              - name: input_9
                selector: "#input_2_9"
                value: $EMAIL
                required: true
              - name: input_11
                selector: "#input_2_11"
                value: $SUBJECT
                required: true
              - name: input_12
                selector: "#input_2_12"
                value: $MESSAGE
                required: true
        - select:
              - name: input_6.4
                selector: "#input_2_6_4"
                value: $ADDRESS_STATE_POSTAL_ABBREV
                required: true
              - name: input_17
                selector: "#input_2_17"
                value: $TOPIC
                required: true
        - click_on:
              - selector: "#gform_submit_button_2"
